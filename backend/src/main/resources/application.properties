# ==========================================
# APPLICATION
# ==========================================
spring.application.name=james-cresslawn-backend
server.port=8080
 
# ==========================================
# DATABASE CONNECTION
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/james_store
spring.datasource.username=Anesu
spring.datasource.password=Taps1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT CONFIGURATION
# This secret key is used to sign and verify tokens.
# Must be at least 256 bits (32 characters) for HS256 algorithm.
# In production: move this to environment variables, never commit to Git.
# ==========================================
jwt.secret=james-cresslawn-super-secret-key-2024-minimum-256-bits-long
jwt.expiration=86400000
# 86400000 milliseconds = 24 hours
# After 24 hours the token expires and the user must log in again

# ==========================================
# OPEN-IN-VIEW WARNING FIX
# ==========================================
spring.jpa.open-in-view=false
 
# ==========================================
# LOGGING
# ==========================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.jamescresslawn=DEBUG

